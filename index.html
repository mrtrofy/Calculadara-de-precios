<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    
    <!-- Configuración para App Instalable (PWA) -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculadora">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    
    <!-- Manifiesto Inline (Simulado para que sea un solo archivo) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkNhbGN1bGFkb3JhIGRlIFByZWNpb3MgUHJvIiwKICAic2hvcnRfbmFtZSI6ICJDYWxjUHJvIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmOWZhZmIiLAogICJ0aGVtZV9jb2xvciI6ICIjMjU2M2ViIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMjM0NC8yMzQ0MTMyLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* Ajuste para notch en móviles */
        .safe-area-padding {
            padding-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-200">
        
        <!-- Panel de Configuración -->
        <div class="w-full md:w-1/2 p-8 bg-white border-r border-gray-100">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-600 rounded-lg text-white shadow-lg shadow-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="8" x2="16" y1="10" y2="10"/><line x1="8" x2="8" y1="14" y2="18"/><line x1="12" x2="12" y1="14" y2="18"/><line x1="16" x2="16" y1="14" y2="18"/></svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Venta Pro</h1>
                </div>
                <!-- Botón de Instalación (Se activa vía JS) -->
                <button id="installBtn" class="hidden text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold animate-pulse">
                    INSTALAR APP
                </button>
            </div>

            <div class="space-y-6">
                <!-- Input Costo Total -->
                <div>
                    <label class="block text-sm font-semibold text-gray-500 mb-2 flex items-center gap-2">
                        COSTO DE CAJA
                    </label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                        <input
                            type="number"
                            id="costoTotal"
                            value="100"
                            inputmode="decimal"
                            oninput="calcular()"
                            class="w-full pl-10 pr-4 py-4 bg-gray-50 border-2 border-transparent group-hover:bg-white focus:bg-white border-gray-100 focus:border-blue-500 rounded-2xl outline-none transition-all font-bold text-lg text-gray-700"
                        />
                    </div>
                </div>

                <!-- Input Unidades -->
                <div>
                    <label class="block text-sm font-semibold text-gray-500 mb-2">
                        UNIDADES EN LA CAJA
                    </label>
                    <input
                        type="number"
                        id="unidadesCaja"
                        value="10"
                        inputmode="numeric"
                        oninput="calcular()"
                        class="w-full px-4 py-4 bg-gray-50 border-2 border-transparent focus:bg-white border-gray-100 focus:border-blue-500 rounded-2xl outline-none transition-all font-bold text-lg text-gray-700"
                    />
                </div>

                <!-- Input Porcentaje -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-500 uppercase">Margen Deseado</label>
                        <span id="labelMargen" class="text-blue-600 font-bold">30%</span>
                    </div>
                    <input
                        type="range"
                        id="margenSlider"
                        min="1"
                        max="300"
                        value="30"
                        oninput="syncMargen(this.value)"
                        class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 mb-6"
                    />
                    <div class="relative">
                        <input
                            type="number"
                            id="margenInput"
                            value="30"
                            inputmode="numeric"
                            oninput="syncMargen(this.value)"
                            class="w-full px-4 py-3 bg-gray-50 border-2 border-transparent focus:bg-white border-gray-100 focus:border-blue-500 rounded-xl outline-none transition-all font-bold text-center text-blue-600"
                        />
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel de Resultados -->
        <div class="w-full md:w-1/2 p-8 bg-slate-900 text-white flex flex-col justify-center relative">
            <!-- Adorno visual -->
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v20M2 12h20"/></svg>
            </div>

            <div class="space-y-8 relative z-10">
                <div class="text-center">
                    <span class="text-slate-400 text-xs uppercase tracking-[0.2em] font-bold">PVP Sugerido Unidad</span>
                    <div id="precioVenta" class="text-7xl font-black mt-2 text-white tabular-nums">
                        $13.00
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-white/5 backdrop-blur-sm">
                        <p class="text-slate-500 text-[10px] mb-1 font-bold uppercase tracking-wider">Costo Unidad</p>
                        <p id="costoUnidad" class="text-xl font-bold text-white">$10.00</p>
                    </div>
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-white/5 backdrop-blur-sm">
                        <p class="text-slate-500 text-[10px] mb-1 font-bold uppercase tracking-wider">Ganancia Unidad</p>
                        <p id="gananciaUnidad" class="text-xl font-bold text-emerald-400">+$3.00</p>
                    </div>
                </div>

                <div class="bg-blue-600 p-6 rounded-[2rem] shadow-2xl shadow-blue-900/20">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="p-1.5 bg-white/20 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                        </div>
                        <span class="font-bold text-lg">Balance Total</span>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm text-blue-100 font-medium">
                            <span>Inversión</span>
                            <span id="invTotal">$100.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-blue-100 font-medium">
                            <span>Venta Total</span>
                            <span id="ventaTotal">$130.00</span>
                        </div>
                        <div class="h-px bg-white/20 my-2"></div>
                        <div class="flex justify-between items-end">
                            <span class="font-bold text-white">Ganancia Neta</span>
                            <span id="gananciaTotal" class="text-3xl font-black text-white">$30.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de la calculadora
        function syncMargen(val) {
            document.getElementById('margenSlider').value = val;
            document.getElementById('margenInput').value = val;
            document.getElementById('labelMargen').innerText = val + '%';
            calcular();
        }

        function calcular() {
            const costoTotal = parseFloat(document.getElementById('costoTotal').value) || 0;
            const unidadesCaja = parseFloat(document.getElementById('unidadesCaja').value) || 0;
            const porcentajeMargen = parseFloat(document.getElementById('margenInput').value) || 0;

            const costoUnidad = unidadesCaja > 0 ? costoTotal / unidadesCaja : 0;
            const gananciaDeseada = costoUnidad * (porcentajeMargen / 100);
            const precioVenta = costoUnidad + gananciaDeseada;
            const ventaTotal = precioVenta * unidadesCaja;
            const gananciaTotal = ventaTotal - costoTotal;

            // Actualizar UI
            document.getElementById('precioVenta').innerText = '$' + precioVenta.toFixed(2);
            document.getElementById('costoUnidad').innerText = '$' + costoUnidad.toFixed(2);
            document.getElementById('gananciaUnidad').innerText = '+$' + gananciaDeseada.toFixed(2);
            document.getElementById('invTotal').innerText = '$' + costoTotal.toFixed(2);
            document.getElementById('ventaTotal').innerText = '$' + ventaTotal.toFixed(2);
            document.getElementById('gananciaTotal').innerText = '$' + gananciaTotal.toFixed(2);
        }

        // Lógica de Instalación (PWA)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // Service Worker corregido: No registrar si estamos en un entorno de pruebas con protocolos no compatibles
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            try {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                // Solo registramos si no estamos en un entorno restrictivo que bloquee blob:
                navigator.serviceWorker.register(swUrl).catch(err => {
                    // Fallback silencioso si el entorno bloquea blobs en SW
                    console.warn("ServiceWorker registration skipped in this environment.");
                });
            } catch (e) {
                console.warn("ServiceWorker not supported in this environment context.");
            }
        }

        window.onload = calcular;
    </script>
</body>
</html>
